name: universe
description: "Minutes of Meeting Note Application"
publish_to: "none"

version: 2026.04.100

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  get: ^4.7.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  crypto: ^3.0.3
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.4
  get_storage: ^2.1.1
  package_info_plus: ^8.3.0
  intl: ^0.20.2
  omni_datetime_picker: ^2.0.4
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/

flutter_native_splash:
  color: "#1565C0"
  android_12:
    icon_background_color: "#1565C0"
  web: false
